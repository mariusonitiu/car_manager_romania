add_vehicle:
  name: Adaugă autovehicul
  description: Adaugă un autovehicul în Car Manager România și creează entitățile aferente după reîncărcarea integrării.
  fields:
    name:
      name: Nume mașină
      description: Numele afișat al autovehiculului.
      required: true
      example: Opel Insignia A
      selector:
        text:
    license_plate:
      name: Număr înmatriculare
      description: Numărul de înmatriculare al autovehiculului.
      required: false
      example: SB01ABC
      selector:
        text:
    vin:
      name: VIN
      description: Seria VIN a autovehiculului.
      required: false
      selector:
        text:
    km:
      name: Kilometraj actual
      description: Kilometrajul actual al autovehiculului.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 1000000
          step: 1
          mode: box

remove_vehicle:
  name: Dezactivează autovehicul
  description: Dezactivează un autovehicul din Car Manager România. Datele rămân în storage pentru siguranță, dar autovehiculul nu mai este încărcat în card și entități după reîncărcarea integrării.
  fields:
    vehicle_id:
      name: Autovehicul
      description: ID-ul intern stabil al autovehiculului care trebuie dezactivat.
      required: true
      example: sb01abc
      selector:
        text:

restore_vehicle:
  name: Reactivează autovehicul
  description: Reactivează un autovehicul dezactivat anterior în Car Manager România. Entitățile lui vor fi create din nou după reîncărcarea integrării.
  fields:
    vehicle_id:
      name: Autovehicul
      description: ID-ul intern stabil al autovehiculului care trebuie reactivat.
      required: true
      example: sb01abc
      selector:
        text:

restore_all_vehicles:
  name: Reactivează toate autovehiculele
  description: Reactivează toate autovehiculele dezactivate anterior în Car Manager România. Este util ca recuperare rapidă dacă un autovehicul a fost dezactivat accidental.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:

add_service_record:
  name: Adaugă intervenție în istoric
  description: Salvează o intervenție în istoricul autovehiculului. Pentru tipurile de mentenanță mecanică poate actualiza automat ultima dată și ultimul kilometraj.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    vehicle_id:
      name: Autovehicul
      description: ID-ul intern stabil, VIN-ul, numărul de înmatriculare sau numele autovehiculului pentru care se adaugă intervenția.
      required: true
      example: sb01abc
      selector:
        text:
    record_type:
      name: Tip intervenție
      description: Tipul intervenției. Pentru service, gearbox_oil, timing_belt, brake_fluid și coolant se pot actualiza automat datele de mentenanță.
      required: true
      example: service
      selector:
        select:
          options:
            - service
            - gearbox_oil
            - timing_belt
            - brake_fluid
            - coolant
            - rca
            - casco
            - itp
            - rovinieta
            - custom
    date:
      name: Data intervenției
      description: Data intervenției în format YYYY-MM-DD. Dacă lipsește, se folosește data curentă.
      required: false
      example: "2026-05-09"
      selector:
        date:
    km:
      name: Kilometraj
      description: Kilometrajul la care s-a făcut intervenția.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 1000000
          step: 1
          mode: box
    title:
      name: Titlu
      description: Titlul scurt al intervenției.
      required: false
      example: Schimb ulei și filtre
      selector:
        text:
    service_name:
      name: Service / furnizor
      description: Service-ul sau furnizorul unde s-a făcut intervenția.
      required: false
      selector:
        text:
    cost:
      name: Cost
      description: Costul intervenției.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 1000000
          step: 0.01
          mode: box
    invoice_number:
      name: Număr factură / document
      description: Număr factură, bon, deviz sau alt document justificativ.
      required: false
      selector:
        text:
    notes:
      name: Observații
      description: Observații despre intervenție.
      required: false
      selector:
        text:
          multiline: true
    update_maintenance:
      name: Actualizează mentenanța
      description: Dacă este activ, pentru tipurile de mentenanță mecanică se actualizează automat ultima dată și ultimul kilometraj.
      required: false
      default: true
      selector:
        boolean:

restore_service_record:
  name: Restaurează intervenție din istoric
  description: Revine la valorile de mentenanță existente înainte de intervenția selectată. Funcționează pentru intervențiile create după introducerea snapshot-ului de restore.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    record_id:
      name: ID intervenție
      description: ID-ul intervenției care trebuie restaurată.
      required: true
      example: rec_1234abcd5678
      selector:
        text:

update_service_record:
  name: Editează intervenție din istoric
  description: Modifică doar câmpurile informative ale unei intervenții din istoric. Nu schimbă data, kilometrajul, tipul intervenției și nu modifică valorile de mentenanță ale autovehiculului.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    record_id:
      name: ID intervenție
      description: ID-ul intervenției care trebuie editată.
      required: true
      example: rec_1234abcd5678
      selector:
        text:
    title:
      name: Titlu
      description: Titlul intervenției.
      required: false
      selector:
        text:
    service_name:
      name: Service / furnizor
      description: Service-ul sau furnizorul unde a fost efectuată intervenția.
      required: false
      selector:
        text:
    cost:
      name: Cost
      description: Costul intervenției.
      required: false
      selector:
        number:
          min: 0
          mode: box
          step: 0.01
          unit_of_measurement: lei
    invoice_number:
      name: Nr. document
      description: Număr factură, bon, deviz sau alt document justificativ.
      required: false
      selector:
        text:
    notes:
      name: Observații
      description: Observații despre intervenție.
      required: false
      selector:
        text:
          multiline: true

delete_service_record:
  name: Șterge intervenție din istoric
  description: Șterge doar înregistrarea din istoric. Nu modifică valorile de mentenanță ale autovehiculului. Dacă intervenția a actualizat mentenanța și vrei să revii la valorile anterioare, folosește mai întâi restore.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    record_id:
      name: ID intervenție
      description: ID-ul intervenției care trebuie ștearsă din istoric.
      required: true
      example: rec_1234abcd5678
      selector:
        text:

restore_last_service_record:
  name: Restaurează ultima intervenție
  description: Revine la valorile de mentenanță existente înainte de ultima intervenție restaurabilă pentru autovehiculul selectat. Poate fi filtrată după tipul intervenției.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    vehicle_id:
      name: Autovehicul
      description: ID-ul intern stabil, VIN-ul, numărul de înmatriculare sau numele autovehiculului.
      required: true
      example: sb01abc
      selector:
        text:
    record_type:
      name: Tip intervenție
      description: Opțional. Dacă este completat, restaurează ultima intervenție de acest tip.
      required: false
      selector:
        select:
          options:
            - service
            - gearbox_oil
            - timing_belt
            - brake_fluid
            - coolant

export_data:
  name: Exportă datele
  description: Salvează un backup JSON local cu autovehiculele, istoricul intervențiilor și starea notificărilor Car Manager România. Fișierul este salvat în /config, nu în /config/www, pentru a nu fi expus public.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    filename:
      name: Nume fișier
      description: Numele fișierului JSON care va fi salvat în /config. Nu introduce directoare sau cale completă.
      required: false
      default: car_manager_romania_backup.json
      example: car_manager_romania_backup.json
      selector:
        text:


validate_backup:
  name: Validează backup JSON
  description: Citește și verifică un backup JSON Car Manager România fără să importe sau să modifice datele existente. Rezultatul apare ca notificare persistentă.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    filename:
      name: Nume fișier
      description: Numele fișierului JSON din /config care trebuie verificat. Nu introduce directoare sau cale completă.
      required: false
      default: car_manager_romania_backup.json
      example: car_manager_romania_backup.json
      selector:
        text:


import_data:
  name: Importă backup JSON
  description: Importă controlat un backup JSON Car Manager România în modul merge. Cu dry_run activ, doar simulează importul și nu modifică datele.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    filename:
      name: Nume fișier
      description: Numele fișierului JSON din /config care trebuie importat. Nu introduce directoare sau cale completă.
      required: false
      default: car_manager_romania_backup.json
      example: car_manager_romania_backup.json
      selector:
        text:
    mode:
      name: Mod import
      description: Momentan este disponibil doar modul merge, care adaugă sau actualizează fără să șteargă date existente.
      required: false
      default: merge
      selector:
        select:
          options:
            - merge
    dry_run:
      name: Simulare fără modificări
      description: Când este activ, serviciul doar arată ce ar importa, fără să modifice datele.
      required: false
      default: true
      selector:
        boolean:

set_legal_option:
  name: Setează opțiune termen legal
  description: Activează sau dezactivează afișarea unui termen legal opțional pentru un autovehicul. Momentan este folosit pentru CASCO.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    vehicle_id:
      name: Autovehicul
      description: ID-ul intern stabil, VIN-ul, numărul de înmatriculare sau numele autovehiculului.
      required: true
      example: sb01abc
      selector:
        text:
    legal_type:
      name: Tip termen legal
      description: Tipul termenului legal opțional.
      required: true
      default: casco
      selector:
        select:
          options:
            - casco
    ignored:
      name: Ascuns / ignorat
      description: Dacă este true, CASCO nu mai apare în card, în stare generală, notificări sau cheltuieli viitoare.
      required: true
      default: true
      selector:
        boolean:

cleanup_orphan_entities:
  name: Curăță entități orfane
  description: Elimină din registry entitățile Car Manager România care aparțin acestei instanțe, dar nu mai sunt generate de integrare. Cu dry_run activ, doar afișează ce ar curăța.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    dry_run:
      name: Simulare fără ștergere
      description: Dacă este activ, serviciul doar raportează entitățile orfane găsite, fără să le elimine.
      required: false
      default: false
      selector:
        boolean:

add_fuel_receipt:
  name: Adaugă bon combustibil
  description: Salvează un bon de combustibil pentru un autovehicul și calculează automat prețul pe litru/kWh și consumul când există alimentări pline valide.
  fields:
    entry_id:
      name: Entry ID
      description: Opțional. ID-ul config entry-ului Car Manager România. Se poate omite dacă există o singură instanță.
      required: false
      selector:
        text:
    vehicle_id:
      name: Autovehicul
      description: ID-ul intern stabil, VIN-ul, numărul de înmatriculare sau numele autovehiculului.
      required: true
      selector:
        text:
    date:
      name: Data alimentării
      description: Data alimentării în format YYYY-MM-DD. Dacă lipsește, se folosește data curentă.
      required: false
      selector:
        date:
    km:
      name: Kilometraj bord
      description: Kilometrajul afișat în bord la alimentare.
      required: true
      selector:
        number:
          min: 1
          max: 1000000
          step: 1
          mode: box
    fuel_type:
      name: Tip combustibil
      description: Tipul combustibilului, validat în funcție de motorizarea autovehiculului.
      required: true
      selector:
        select:
          options:
            - gasoline_standard
            - gasoline_premium
            - diesel_standard
            - diesel_premium
            - lpg
            - electric_charge
    quantity:
      name: Litri / kWh
      description: Cantitatea alimentată, în litri pentru combustibil clasic sau kWh pentru încărcare electrică.
      required: true
      selector:
        number:
          min: 0.001
          max: 10000
          step: 0.001
          mode: box
    total_cost:
      name: Valoare bon
      description: Valoarea totală plătită pe bon.
      required: true
      selector:
        number:
          min: 0.01
          max: 100000
          step: 0.01
          mode: box
    full_tank:
      name: Plin făcut
      description: Bifează pentru alimentările până la plin. Consumul mediu se calculează corect între două plinuri, cumulând alimentările parțiale intermediare.
      required: false
      default: true
      selector:
        boolean:
    station:
      name: Stație carburant
      required: false
      selector:
        text:
    notes:
      name: Observații
      required: false
      selector:
        text:
          multiline: true

